<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer Dollars | Stretch Your Beer Money</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="splash">
        <img src="{{ url_for('static', filename='1773978135981~2.png') }}" alt="Logo">
        <div class="loader"></div>
        <p>Anchoring System...</p>
    </div>

    <div id="auth" class="hidden">
        <div class="login-box">
            <h1>Beer Dollars</h1>
            <input type="tel" id="phone" placeholder="Phone Number">
            <button onclick="showCodeInput()">Send Code</button>
            <div id="code-section" class="hidden">
                <input type="text" id="code" placeholder="0000">
                <button onclick="verifyCode()">Verify Access</button>
            </div>
        </div>
    </div>

    <div id="main" class="hidden">
        <header><h2>Thank God It's Friday</h2></header>
        <div id="bar-list"></div>
        <div id="map"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_key }}&callback=initMap" async defer></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
