<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.5.0/dist/ol.js"></script>
</head>
<body>

<!-- --------------------
     SPLASH ANIMATION
-------------------- -->
<div id="splash">
    <div class="beer-fill"></div>
</div>

<!-- --------------------
     HEADER
-------------------- -->
<div class="header">
    <h2>🍺 Beer Dollars</h2>
    <p>Stretch Your Beer Money</p>
</div>

<!-- --------------------
     DAY SELECTOR
-------------------- -->
<div class="day-selector">
    <button onclick="loadDay('Monday')">Mon</button>
    <button onclick="loadDay('Tuesday')">Tue</button>
    <button onclick="loadDay('Wednesday')">Wed</button>
    <button onclick="loadDay('Thursday')">Thu</button>
    <button onclick="loadDay('Friday')">Fri</button>
    <button onclick="loadDay('Saturday')">Sat</button>
    <button onclick="loadDay('Sunday')">Sun</button>
</div>

<!-- --------------------
     BAR LIST
-------------------- -->
<div id="results"></div>

<!-- --------------------
     MAP
-------------------- -->
<div id="map"></div>

<!-- --------------------
     ADD SPECIAL FORM
-------------------- -->
<div class="form add-form">
    <h3>Add Special</h3>
    <input id="bar" placeholder="Bar name">
    <input id="address" placeholder="Address or click map to drop pin">
    <input id="deal" placeholder="Deal">
    <input id="day" placeholder="Day">
    <button onclick="addSpecial()">Add</button>
</div>

<!-- --------------------
     SCRIPTS
-------------------- -->
<script src="/static/map.js"></script>
<script src="/static/app.js"></script>

<script>
    // Hide splash after animation
    document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
            const splash = document.getElementById("splash");
            if (splash) splash.style.display = "none";
        }, 2500); // matches beer-fill animation duration
    });
</script>

</body>
</html>
