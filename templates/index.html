<!DOCTYPE html>
<html>
<head>
  <title>Beer Dollars</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      font-family: Arial;
    }

    #top-bar {
      background: #ffffff;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 2;
    }

    #map {
      height: 50%;
      width: 100%;
    }

    #deals-panel {
      height: 50%;
      overflow-y: auto;
      background: #0A3D62;
      color: white;
      padding: 10px;
    }

    .deal {
      background: #145A86;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    button, select {
      padding: 8px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div id="top-bar">
    <button id="nearMeBtn">📍 Near Me</button>

    <select id="daySelect">
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
      <option value="Saturday">Saturday</option>
    </select>
  </div>

  <div id="map"></div>

  <div id="deals-panel">
    <h2>Deals</h2>
    <div id="deals-list"></div>
  </div>

  <script>
    let map;
    let markers = [];
    let userLocation = { lat: 41.0998, lng: -80.6495 }; // Youngstown fallback

    // 🔥 MOCK DATA (guaranteed working)
    const mockDeals = [
      {
        bar: "The Downtown Bar",
        lat: 41.0998,
        lng: -80.6495,
        deals: {
          Thursday: "$2 Beers",
          Friday: "Live DJ + $3 Shots",
          Saturday: "$5 Pitchers"
        }
      },
      {
        bar: "Campus Pub",
        lat: 41.105,
        lng: -80.646,
        deals: {
          Thursday: "Trivia Night + $1 Wings",
          Friday: "$4 Long Islands",
          Saturday: "Karaoke + $3 Drinks"
        }
      }
    ];

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: userLocation,
        zoom: 13,
      });

      loadDeals();
    }

    function loadDeals(day = null) {
      const selectedDay = day || document.getElementById("daySelect").value;

      clearMarkers();

      mockDeals.forEach(bar => {
        const marker = new google.maps.Marker({
          position: { lat: bar.lat, lng: bar.lng },
          map: map,
          title: bar.bar
        });

        marker.addListener("click", () => {
          renderDeals([bar], selectedDay);
        });

        markers.push(marker);
      });

      // Show all deals by default
      renderDeals(mockDeals, selectedDay);
    }

    function renderDeals(bars, day) {
      const list = document.getElementById("deals-list");
      list.innerHTML = "";

      bars.forEach(bar => {
        const div = document.createElement("div");
        div.className = "deal";

        div.innerHTML = `
          <h3>${bar.bar}</h3>
          <p><strong>${day}:</strong> ${bar.deals[day] || "No deal"}</p>
        `;

        list.appendChild(div);
      });
    }

    function clearMarkers() {
      markers.forEach(m => m.setMap(null));
      markers = [];
    }

    // 📍 Near Me
    document.getElementById("nearMeBtn").addEventListener("click", () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          userLocation = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          };

          map.setCenter(userLocation);

          new google.maps.Marker({
            position: userLocation,
            map: map,
            title: "You are here"
          });
        });
      }
    });

    // 📅 Day change
    document.getElementById("daySelect").addEventListener("change", function() {
      loadDeals(this.value);
    });

  </script>

  <!-- 🔑 YOUR GOOGLE MAPS API KEY HERE -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
  </script>

</body>
</html>
