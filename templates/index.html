<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>
</head>
<body>
    <div class="main-container">
        <h1>Beer Dollars</h1>

        <!-- Day buttons -->
        <div id="day-buttons">
            <button onclick="loadBars('Monday')">Monday</button>
            <button onclick="loadBars('Tuesday')">Tuesday</button>
            <button onclick="loadBars('Wednesday')">Wednesday</button>
            <button onclick="loadBars('Thursday')">Thursday</button>
            <button onclick="loadBars('Friday')">Friday</button>
            <button onclick="loadBars('Saturday')">Saturday</button>
            <button onclick="loadBars('Sunday')">Sunday</button>
        </div>

        <!-- Bar list -->
        <div id="bar-list"></div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Add bar floating icon -->
        <button id="add-bar-btn" onclick="showAddBarForm()">＋ Add Bar</button>

        <!-- Add bar form modal -->
        <div id="add-bar-form" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeAddBarForm()">&times;</span>
                <h2>Add New Bar</h2>
                <input type="text" id="bar-name" placeholder="Bar Name">
                <input type="text" id="bar-address" placeholder="Address">
                <input type="text" id="bar-lat" placeholder="Latitude">
                <input type="text" id="bar-lng" placeholder="Longitude">
                <input type="text" id="bar-day" placeholder="Day (Monday–Sunday)">
                <input type="text" id="bar-special" placeholder="Special">
                <button onclick="submitBar()">Submit</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
