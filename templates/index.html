<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars</title>

    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.0/ol.css">
    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Splash Header -->
    <div id="splash">
        <h1>🍺 Beer Dollars</h1>
        <p>"Stretch your beer dollars"</p>
    </div>

    <!-- Day Buttons -->
    <div id="days">
        <button data-day="Monday">Monday</button>
        <button data-day="Tuesday">Tuesday</button>
        <button data-day="Wednesday">Wednesday</button>
        <button data-day="Thursday">Thursday</button>
        <button data-day="Friday">Friday</button>
        <button data-day="Saturday">Saturday</button>
        <button data-day="Sunday">Sunday</button>
    </div>

    <!-- Map -->
    <div id="map" style="height: 50vh; width: 100%; margin-bottom: 10px;"></div>

    <!-- Bar List -->
    <div id="bar-list"></div>

    <!-- Add Bar Form -->
    <div id="add-bar-form">
        <h3>Add a Bar</h3>
        <form id="new-bar-form">
            <label>Name: <input type="text" name="name" required></label><br>
            <label>Address: <input type="text" name="address"></label><br>
            <label>Deal: <input type="text" name="deal" required></label><br>
            <label>Day:
                <select name="day" required>
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>
                </select>
            </label><br>
            <input type="hidden" name="lat">
            <input type="hidden" name="lng">
            <button type="submit">Add Bar</button>
        </form>
    </div>

    <!-- OpenLayers JS -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.5.0/dist/ol.js"></script>
    <!-- Your map logic -->
    <script src="{{ url_for('static', filename='map.js') }}"></script>
    <!-- Your app logic (fetch / API calls) -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
