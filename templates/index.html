<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<h2>Stretch Your Beer Money</h2>

<div id="days">
    <button onclick="load('Mon')">Mon</button>
    <button onclick="load('Tue')">Tue</button>
    <button onclick="load('Wed')">Wed</button>
    <button onclick="load('Thu')">Thu</button>
    <button onclick="load('Fri')">Fri</button>
    <button onclick="load('Sat')">Sat</button>
    <button onclick="load('Sun')">Sun</button>
</div>

<div id="list"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([40.4173, -82.9071], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];

function clearMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
}

function load(day) {
    fetch(`/specials?day=${day}`)
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("list");
        list.innerHTML = "";
        clearMarkers();

        data.forEach(s => {
            list.innerHTML += `
                <div class="card">
                    <h3>${s.name}</h3>
                    <p>${s.deal}</p>
                    <small>${s.address || "No address"}</small>
                </div>
            `;

            if (s.lat && s.lng) {
                let marker = L.marker([s.lat, s.lng])
                    .addTo(map)
                    .bindPopup(`<b>${s.name}</b><br>${s.deal}`);
                markers.push(marker);
            }
        });
    });
}
</script>

</body>
</html>
