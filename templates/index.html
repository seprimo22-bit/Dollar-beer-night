<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- Map -->
    <div id="map"></div>

    <!-- Greeting -->
    <div id="greeting">🍺 Beer Dollars</div>

    <!-- Day Tabs -->
    <div id="day-tabs"></div>

    <!-- Bar List -->
    <div id="bar-list"></div>

    <!-- Add Special Button -->
    <button id="add-special-btn">+</button>

    <!-- Add Special Modal -->
    <div id="add-modal">
        <div id="add-modal-content">
            <form id="add-form">
                <input name="name" placeholder="Bar Name" required>
                <input name="address" placeholder="Address">
                <input name="deal" placeholder="Deal" required>
                <select name="day">
                    <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                    <option>Thursday</option><option>Friday</option><option>Saturday</option>
                    <option>Sunday</option>
                </select>
                <button type="submit">Save</button>
                <button type="button" id="add-close">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&callback=initBeerDollars" async defer></script>
    <script>
        let map, markers = [], infoWindow, tempMarker;
        const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
        let selectedDay = "";

        function initBeerDollars() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 41.1009, lng: -80.6495 },
                zoom: 13
            });
            infoWindow = new google.maps.InfoWindow();
            map.addListener("click", (e)=>openAddModal(e.latLng.lat(), e.latLng.lng()));

            renderDayTabs();
            fetchSpecials();
        }

        function renderDayTabs() {
            const container = document.getElementById("day-tabs");
            container.innerHTML = "";
            days.forEach(day => {
                const btn = document.createElement("button");
                btn.className = "day-tab" + (day===selectedDay?" active-day":"");
                btn.textContent = day;
                btn.onclick = () => { selectedDay = (selectedDay===day?"":day); fetchSpecials(); renderDayTabs(); };
                container.appendChild(btn);
            });
        }

        async function fetchSpecials() {
            const res = await fetch('/api/specials');
            let data = await res.json();
            if (selectedDay) data = data.filter(d=>d.day===selectedDay);

            document.getElementById("bar-list").innerHTML = "";
            markers.forEach(m=>m.setMap(null));
            markers=[];

            data.forEach(s=>{ createMarker(s); addToList(s); });
        }

        function createMarker(s) {
            if(!s.lat||!s.lng) return;
            const marker = new google.maps.Marker({
                position:{lat:parseFloat(s.lat), lng:parseFloat(s.lng)},
                map
            });
            marker.addListener("click", ()=>{ infoWindow.setContent(`<b>${s.name}</b><br>${s.deal}`); infoWindow.open(map, marker); });
            markers.push(marker);
        }

        function addToList(s){
            const div = document.createElement("div"); div.className="bar-item";
            div.innerHTML=`<div class="bar-name">${s.name}</div><div class="bar-deal">${s.deal}</div>`;
            div.onclick=()=>{ map.panTo({lat:parseFloat(s.lat), lng:parseFloat(s.lng)}); map.setZoom(15); };
            document.getElementById("bar-list").appendChild(div);
        }

        function openAddModal(lat,lng){
            window.pendingLat=lat; window.pendingLng=lng;
            if(tempMarker) tempMarker.setMap(null);
            tempMarker = new google.maps.Marker({position:{lat,lng}, map});
            document.getElementById("add-modal").classList.add("visible");
        }

        document.getElementById("add-close").onclick = ()=>{ document.getElementById("add-modal").classList.remove("visible"); };

        document.getElementById("add-form").addEventListener("submit", async e=>{
            e.preventDefault();
            const form = new FormData(e.target);
            const payload = {
                name: form.get("name"), address: form.get("address"), deal: form.get("deal"),
                day: form.get("day"), lat: window.pendingLat, lng: window.pendingLng
            };
            await fetch('/api/add_special',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
            document.getElementById("add-modal").classList.remove("visible");
            fetchSpecials();
        });

        document.getElementById("add-special-btn").onclick = ()=>{ map.setCenter(map.getCenter()); map.setZoom(14); };
    </script>
</body>
</html>
