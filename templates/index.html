<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Beer Dollars</h1>
<div id="bar-list"></div>
<div id="map"></div>
<button onclick="addBar()">+</button>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAiEK4CduUBr7EWeqtSsFhG1nQyqON6QYI&callback=initMap" async defer></script>

<script>
let map;

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: { lat: 41.099, lng: -80.649 }
    });
}

async function loadBars() {
    const res = await fetch('/api/specials');
    const bars = await res.json();
    const list = document.getElementById('bar-list');
    list.innerHTML = '';
    bars.forEach(bar => {
        const div = document.createElement('div');
        div.innerText = `${bar.name} - ${bar.special}`;
        list.appendChild(div);
    });
}

async function addBar() {
    const name = prompt("Name");
    const address = prompt("Address");
    const special = prompt("Special");
    await fetch('/api/specials', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, address, special, day:"Daily", lat:41.1, lng:-80.6})
    });
    loadBars();
}

loadBars();
</script>

</body>
</html>
