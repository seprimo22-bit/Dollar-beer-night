<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">

    <!-- Splash Header -->
    <div id="splash">
        <h1>🍺 Beer Dollars</h1>
        <p>Stretch your beer dollars</p>
    </div>

    <!-- Day Buttons -->
    <div id="days">
        <button data-day="Monday">Monday</button>
        <button data-day="Tuesday">Tuesday</button>
        <button data-day="Wednesday">Wednesday</button>
        <button data-day="Thursday">Thursday</button>
        <button data-day="Friday">Friday</button>
        <button data-day="Saturday">Saturday</button>
        <button data-day="Sunday">Sunday</button>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Bar List -->
    <div id="bar-list"></div>

    <!-- Add Bar Form -->
    <div id="add-bar-form">
        <h3>Add a Bar</h3>
        <form id="new-bar-form">
            <label>Name:
                <input type="text" name="name" required>
            </label>

            <label>Address:
                <input type="text" name="address">
            </label>

            <label>Deal:
                <input type="text" name="deal" required>
            </label>

            <label>Day:
                <select name="day" required>
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>
                </select>
            </label>

            <!-- Hidden lat/lng fields -->
            <input type="hidden" id="bar-lat" name="lat">
            <input type="hidden" id="bar-lng" name="lng">

            <button type="submit">Add Bar</button>
        </form>
    </div>

</div>

<!-- Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap" async defer></script>

<!-- Your map logic -->
<script src="{{ url_for('static', filename='map.js') }}"></script>

<!-- Your app logic -->
<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
