<!DOCTYPE html>
<html>
<head>
<title>Beer Dollars</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body,html { margin:0; padding:0; height:100%; font-family:Arial; overflow:hidden; background:#0A3D62; }
#map { width:100%; height:65%; z-index:1; }
#bar-list { height:35%; overflow-y:auto; background:rgba(0,0,0,0.75); color:white; padding:10px; }
.bar-item { padding:10px; border-bottom:1px solid #555; cursor:pointer; }
.bar-name { font-size:18px; font-weight:bold; }
.bar-deal { color:#FFC312; }
#add-special-btn { position:absolute; bottom:50%; right:20px; background:#FFC312;color:black;border:none;padding:14px 18px;border-radius:50%;font-size:22px;font-weight:bold;z-index:20; }
#add-modal { position:fixed; top:0; left:0;width:100%;height:100%;background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:30; }
#add-modal.visible { display:flex; }
#add-modal-content { background:white;padding:20px;width:90%;max-width:400px;border-radius:10px; }
#add-modal-content input, select { width:100%; padding:10px; margin-top:8px; border-radius:6px; border:1px solid #ccc; }
#add-modal-content button { width:100%; padding:12px; margin-top:12px; background:#1B9CFC;color:white;border:none;border-radius:6px;font-size:16px; }
#add-close { background:#aaa; }
#controls { position:absolute; top:10px; left:10px; z-index:10; }
#controls button, #controls select { padding:6px 10px; margin-right:6px; border-radius:6px; border:none; }
</style>
</head>
<body>

<div id="controls">
    <button onclick="findMe()">📍 Near Me</button>
    <select id="day-filter" onchange="fetchSpecials()">
        <option value="">All Days</option>
        <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
        <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
    </select>
</div>

<div id="map"></div>
<div id="bar-list"></div>
<button id="add-special-btn" onclick="openAddModal()">＋</button>

<div id="add-modal">
    <div id="add-modal-content">
        <form id="add-form">
            <input name="name" placeholder="Bar Name" required>
            <input name="address" placeholder="Address">
            <input name="deal" placeholder="Deal" required>
            <select name="day">
                <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
            </select>
            <button type="submit">Save</button>
            <button type="button" id="add-close">Cancel</button>
        </form>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&callback=initBeerDollars" async defer></script>
<script>
let map, markers=[], infoWindow, tempMarker;

function initBeerDollars() {
    const defaultCenter={lat:41.101,lng:-80.649};
    map=new google.maps.Map(document.getElementById("map"),{zoom:13,center:defaultCenter});
    infoWindow=new google.maps.InfoWindow();
    map.addListener("click", e=>{openAddModal(e.latLng.lat(),e.latLng.lng());});
    fetchSpecials();
}

window.initBeerDollars=initBeerDollars;

async function fetchSpecials() {
    let day=document.getElementById("day-filter").value;
    const res=await fetch('/api/specials'); let data=await res.json();
    if(day) data=data.filter(d=>d.day===day);

    markers.forEach(m=>m.setMap(null)); markers=[];
    document.getElementById("bar-list").innerHTML="";

    data.forEach(s=>{
        if(s.lat&&s.lng){
            const marker=new google.maps.Marker({position:{lat:parseFloat(s.lat),lng:parseFloat(s.lng)},map});
            marker.addListener("click",()=>{infoWindow.setContent(`<b>${s.name}</b><br>${s.deal}<br>${s.address||""}`); infoWindow.open(map,marker);});
            markers.push(marker);
        }
        const div=document.createElement("div");
        div.className="bar-item";
        div.innerHTML=`<div class="bar-name">${s.name}</div><div class="bar-deal">${s.deal}</div><div class="bar-address">${s.address||""}</div>`;
        div.onclick=()=>{map.panTo({lat:parseFloat(s.lat),lng:parseFloat(s.lng)}); map.setZoom(15);};
        document.getElementById("bar-list").appendChild(div);
    });
}

function openAddModal(lat=null,lng=null){
    if(lat&&lng){ window.pendingLat=lat; window.pendingLng=lng; }
    document.getElementById("add-modal").classList.add("visible");
}
document.getElementById("add-close").onclick=()=>{document.getElementById("add-modal").classList.remove("visible");};

document.getElementById("add-form").addEventListener("submit", async e=>{
    e.preventDefault();
    const form=new FormData(e.target);
    const payload={
        name:form.get("name"), address:form.get("address"),
        deal:form.get("deal"), day:form.get("day"),
        lat:window.pendingLat||41.101, lng:window.pendingLng||-80.649
    };
    await fetch('/api/add_special',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    document.getElementById("add-modal").classList.remove("visible");
    fetchSpecials();
});

function findMe(){
    navigator.geolocation.getCurrentPosition(pos=>{
        const loc={lat:pos.coords.latitude,lng:pos.coords.longitude};
        map.setCenter(loc); map.setZoom(14);
    });
}
</script>
</body>
</html>
