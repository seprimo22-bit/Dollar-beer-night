
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <!-- Splash Page -->
    <div id="splash-page" class="splash">
        <img src="static/beer_dollars_logo.png" alt="Beer Dollars Logo" class="splash-logo">
        <div class="splash-form">
            <input type="text" id="phone" placeholder="Enter your phone number">
            <input type="text" id="code" placeholder="Enter your code">
            <button id="enter-btn">Enter</button>
        </div>
        <div id="splash-error" class="error-msg"></div>
    </div>

    <!-- Main App Page -->
    <div id="main-app" class="hidden">
        <h1>Beer Dollars — Stretch Your Beer Money</h1>

        <!-- Day Selector -->
        <div id="day-selector">
            <button class="day-btn" data-day="Monday">Mon</button>
            <button class="day-btn" data-day="Tuesday">Tue</button>
            <button class="day-btn" data-day="Wednesday">Wed</button>
            <button class="day-btn" data-day="Thursday">Thu</button>
            <button class="day-btn" data-day="Friday">Fri</button>
            <button class="day-btn" data-day="Saturday">Sat</button>
            <button class="day-btn" data-day="Sunday">Sun</button>
        </div>

        <!-- Bar Listings -->
        <div id="bar-list"></div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Add Bar Floating Button -->
        <button id="add-bar-btn" class="floating-btn">+</button>
    </div>

    <!-- Google Maps + App Scripts -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAiEK4CduUBr7EWeqtSsFhG1nQyqON6QYI&callback=initMap" async defer></script>
    <script src="static/script.js"></script>
</body>
</html>
