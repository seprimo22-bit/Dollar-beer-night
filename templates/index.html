<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <style>
        body { background-color: white; color: #003366; margin: 0; font-family: sans-serif; }
        .header { background-color: #003366; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #0055aa; }
        .day-nav { display: flex; justify-content: space-around; background: #eee; padding: 10px; cursor: pointer; border-bottom: 2px solid #003366; }
        .day-item { padding: 8px; border: 1px solid #003366; border-radius: 4px; font-weight: bold; }
        .day-item:hover { background: #003366; color: white; }
        #map { height: 400px; width: 100%; border: 3px solid #003366; }
        .bar-card { padding: 15px; border-bottom: 1px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>$3 Beer Dollars</h1>
        <p>Stretch Your Dollars, Stretch Your Mind</p>
    </div>

    <div class="day-nav" id="dayNav">
        <div class="day-item" onclick="loadDeals('Monday')">Mon</div>
        <div class="day-item" onclick="loadDeals('Tuesday')">Tue</div>
        <div class="day-item" onclick="loadDeals('Wednesday')">Wed</div>
        <div class="day-item" onclick="loadDeals('Thursday')">Thu</div>
        <div class="day-item" onclick="loadDeals('Friday')">Fri</div>
        <div class="day-item" onclick="loadDeals('Saturday')">Sat</div>
        <div class="day-item" onclick="loadDeals('Sunday')">Sun</div>
    </div>

    <div id="listings"></div>
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

    <script>
        let map;
        let markers = [];

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: {lat: 41.0998, lng: -80.6495},
                zoom: 13
            });
            loadDeals('{{ current_day }}');
        }

        function loadDeals(day) {
            fetch(`/api/deals/${day}`)
                .then(res => res.json())
                .then(data => {
                    const listDiv = document.getElementById('listings');
                    listDiv.innerHTML = `<h3 style="padding: 10px;">${day} Specials</h3>`;
                    
                    markers.forEach(m => m.setMap(null));
                    markers = [];

                    data.forEach(bar => {
                        const card = document.createElement('div');
                        card.className = 'bar-card';
                        card.innerHTML = `<strong>${bar.name}</strong>: ${bar.deal}`;
                        card.onclick = () => {
                            map.setCenter({lat: bar.lat, lng: bar.lng});
                            map.setZoom(17);
                        };
                        listDiv.appendChild(card);

                        const marker = new google.maps.Marker({
                            position: {lat: bar.lat, lng: bar.lng},
                            map: map,
                            title: bar.name
                        });
                        markers.push(marker);
                    });
                });
        }
    </script>
</body>
</html>
