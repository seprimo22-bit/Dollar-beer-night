<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<img id="splash-image" src="{{ url_for('static', filename='1773978135981.png') }}">
<div id="splash-banner">Beer Dollars</div>
<div id="splash-subtitle">Stretch your beer money</div>

<select id="day-select">
    <option>Sun</option><option>Mon</option><option>Tue</option>
    <option>Wed</option><option>Thu</option><option>Fri</option>
    <option>Sat</option>
</select>

<div id="specials-container"></div>

<div id="map"></div>

<button id="add-bar-btn" onclick="window.location.href='/admin'">+</button>

<script>
let map;
let markers = [];

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: {lat: 40.975, lng: -80.612},
        zoom: 12
    });
}

function loadSpecials(day) {
    fetch(`/specials?day=${day}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById("specials-container").innerHTML = "";
            markers.forEach(m => m.setMap(null));
            markers = [];
            data.forEach(s => {
                const div = document.createElement("div");
                div.className = "card";
                if(s.promotion === "gold") div.classList.add("paid-gold");
                if(s.promotion === "silver") div.classList.add("paid-silver");
                div.innerHTML = `<b>${s.name}</b> - ${s.deal}`;
                document.getElementById("specials-container").appendChild(div);

                if(s.lat && s.lng) {
                    const marker = new google.maps.Marker({
                        position: {lat: s.lat, lng: s.lng},
                        map: map,
                        title: s.name
                    });
                    markers.push(marker);
                }
            });
        });
}

// Default to today
window.onload = function() {
    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const today = days[new Date().getDay()];
    document.getElementById("day-select").value = today;
    loadSpecials(today);
    document.getElementById("day-select").onchange = e => loadSpecials(e.target.value);
};
</script>
<script async
    src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&callback=initMap">
</script>
</body>
</html>
