
<!DOCTYPE html>
<html>
<head>
    <title>Admin</title>
</head>
<body>

<h2>Add Special</h2>

<form method="POST" action="/add">
    <input name="name" placeholder="Bar Name" required><br>
    <input name="deal" placeholder="Deal" required><br>

    <select name="day">
        <option>Mon</option>
        <option>Tue</option>
        <option>Wed</option>
        <option>Thu</option>
        <option>Fri</option>
        <option>Sat</option>
        <option>Sun</option>
    </select><br>

    <input name="address" placeholder="Full Address"><br>

    <button type="submit">Add</button>
</form>

</body>
</html>
