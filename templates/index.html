<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 60vh; width: 100%; }

        .controls {
            padding: 10px;
            background: #111;
            color: white;
        }

        .bar-item {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
        }

        .bar-item:hover {
            background: #f5f5f5;
        }

        #add-modal {
            display: none;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        #add-modal.visible {
            display: block;
        }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="findMe()">📍 Near Me</button>

    <select id="day-filter" onchange="fetchSpecials()">
        <option value="">All Days</option>
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
    </select>

    <span id="deal-count"></span>
</div>

<div id="map"></div>
<div id="bar-list"></div>

<!-- MODAL -->
<div id="add-modal">
    <form id="add-form">
        <input name="name" placeholder="Bar Name" required><br>
        <input name="address" placeholder="Address"><br>
        <input name="deal" placeholder="Deal" required><br>

        <select name="day">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
            <option>Sunday</option>
        </select><br><br>

        <button type="submit">Save</button>
        <button type="button" id="add-close">Cancel</button>
    </form>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&callback=initBeerDollars" async defer></script>

<script>
let map;
let markers = [];
let infoWindow;
let tempMarker;

function initBeerDollars() {
    if (!window.google) {
        console.error("Google Maps failed to load.");
        return;
    }

    const defaultCenter = { lat: 41.1009, lng: -80.6495 };

    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 13,
        center: defaultCenter
    });

    infoWindow = new google.maps.InfoWindow();

    map.addListener("click", (e) => {
        openAddModal(e.latLng.lat(), e.latLng.lng());
    });

    fetchSpecials();
}

window.initBeerDollars = initBeerDollars;

async function fetchSpecials() {
    const day = document.getElementById("day-filter").value;

    const res = await fetch('/api/specials');
    let data = await res.json();

    if (day) {
        data = data.filter(d => d.day === day);
    }

    document.getElementById("deal-count").innerText = `${data.length} deals`;

    markers.forEach(m => m.setMap(null));
    markers = [];

    document.getElementById("bar-list").innerHTML = "";

    data.forEach(s => {
        createMarker(s);
        addToList(s);
    });
}

function createMarker(s) {
    if (!s.lat || !s.lng) return;

    const marker = new google.maps.Marker({
        position: { lat: parseFloat(s.lat), lng: parseFloat(s.lng) },
        map
    });

    marker.addListener("click", () => {
        infoWindow.setContent(`<b>${s.name}</b><br>${s.deal}`);
        infoWindow.open(map, marker);
    });

    markers.push(marker);
}

function addToList(s) {
    const div = document.createElement("div");
    div.className = "bar-item";
    div.innerHTML = `<b>${s.name}</b><br>${s.deal}`;

    div.onclick = () => {
        map.panTo({ lat: parseFloat(s.lat), lng: parseFloat(s.lng) });
        map.setZoom(15);
    };

    document.getElementById("bar-list").appendChild(div);
}

function openAddModal(lat, lng) {
    window.pendingLat = lat;
    window.pendingLng = lng;

    if (tempMarker) tempMarker.setMap(null);

    tempMarker = new google.maps.Marker({
        position: { lat, lng },
        map
    });

    document.getElementById("add-modal").classList.add("visible");
}

document.getElementById("add-close").onclick = () => {
    document.getElementById("add-modal").classList.remove("visible");
};

document.getElementById("add-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = new FormData(e.target);

    const payload = {
        name: form.get("name"),
        address: form.get("address"),
        deal: form.get("deal"),
        day: form.get("day"),
        lat: window.pendingLat,
        lng: window.pendingLng
    };

    await fetch('/api/add_special', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    document.getElementById("add-modal").classList.remove("visible");
    fetchSpecials();
});

function findMe() {
    navigator.geolocation.getCurrentPosition(pos => {
        const loc = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
        };
        map.setCenter(loc);
        map.setZoom(14);
    });
}
</script>

</body>
</html>
