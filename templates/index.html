<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beer Dollars</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="top-bar">
  <div id="day-bubbles"></div>
  <button id="nearMeBtn">📍 Near Me</button>
</div>

<div id="map"></div>
<div id="map-error"></div>

<div id="deals-panel">
  <h2>Deals</h2>
  <div id="deals-list"></div>

  <h3>Add a Bar</h3>
  <form id="addBarForm">
    <input type="text" id="barName" placeholder="Bar Name" required>
    <input type="text" id="address" placeholder="Address (Google will locate it)" required>
    <div id="dealInputs"></div>
    <p>Or click on the map to drop a pin.</p>
    <button type="submit">Add Bar</button>
  </form>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAiEK4CduUBr7EWeqtSsFhG1nQyqON6QYI&callback=initMap&libraries=places">
</script>

</body>
</html>
