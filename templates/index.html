<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beer Dollars</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="top-bar">
    <button id="nearMeBtn">📍 Near Me</button>
    <select id="daySelect">
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
      <option value="Saturday">Saturday</option>
    </select>
  </div>

  <div id="map"></div>
  <div id="map-error"></div>

  <div id="deals-panel">
    <h2>Deals</h2>
    <div id="deals-list"></div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>

  <!-- Google Maps API -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAiEK4CduUBr7EWeqtSsFhG1nQyqON6QYI&callback=initMap"
    onerror="document.getElementById('map-error').innerText='Failed to load Google Maps script.'">
  </script>

</body>
</html>
