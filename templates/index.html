<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="main-container">
    <h1>Beer Dollars — Stretch your beer money</h1>

    <!-- Day buttons -->
    <div class="days">
        {% for day in ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'] %}
            <button class="day-btn {% if day == current_day %}active{% endif %}" onclick="filterDay('{{ day }}')">{{ day }}</button>
        {% endfor %}
    </div>

    <!-- Bar listings -->
    <div id="bar-list">
        {% for bar in bars %}
            <div class="bar-item" data-day="{{ bar.day }}" data-lat="{{ bar.lat }}" data-lng="{{ bar.lng }}">
                <h3>{{ bar.name }} {% if bar.verified %}✔{% endif %}</h3>
                <p>{{ bar.special }}</p>
                <p>{{ bar.address }}</p>
            </div>
        {% endfor %}
    </div>

    <!-- Map -->
    <div id="map" style="height:300px;"></div>

    <!-- Floating add bar button -->
    <button id="add-bar-btn" onclick="toggleAddBarForm()">+ Add Bar</button>

    <!-- Add bar form -->
    <div id="add-bar-form" style="display:none;">
        <input type="text" id="bar-name" placeholder="Bar Name">
        <input type="text" id="bar-address" placeholder="Address">
        <input type="text" id="bar-special" placeholder="Special">
        <select id="bar-day">
            {% for day in ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'] %}
                <option value="{{ day }}">{{ day }}</option>
            {% endfor %}
        </select>
        <button onclick="submitBar()">Add</button>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_KEY"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
