<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>

    <link rel="stylesheet" href="/static/style.css">

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key={{ config['GOOGLE_MAPS_API_KEY'] }}"></script>
</head>
<body>

<div class="container">

    <h1>🍺 Beer Dollars</h1>
    <h2>Stretch Your Beer Money</h2>

    <!-- DAY SELECTOR -->
    <div class="days">
        <button onclick="loadDay('Monday')">Mon</button>
        <button onclick="loadDay('Tuesday')">Tue</button>
        <button onclick="loadDay('Wednesday')">Wed</button>
        <button onclick="loadDay('Thursday')">Thu</button>
        <button onclick="loadDay('Friday')">Fri</button>
        <button onclick="loadDay('Saturday')">Sat</button>
        <button onclick="loadDay('Sunday')">Sun</button>
    </div>

    <!-- LIST -->
    <div id="list"></div>

    <!-- MAP -->
    <div id="map"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
