<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { margin: 0; font-family: Arial; }

        .header {
            background: #2b6cb0;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .day-selector {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            position: relative;
            z-index: 10;
        }

        .day-selector button {
            padding: 10px 14px;
            border: none;
            background: #2b6cb0;
            color: white;
            border-radius: 6px;
        }

        #results {
            padding: 10px;
        }

        #map {
            height: 300px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .form {
            padding: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
        }

        button {
            padding: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/ol@v7.5.0/dist/ol.js"></script>
</head>

<body>

<div class="header">
    <h2>🍺 Beer Dollars</h2>
    <p>Stretch Your Beer Money</p>
</div>

<div class="day-selector">
    <button onclick="loadDay('Monday')">Mon</button>
    <button onclick="loadDay('Tuesday')">Tue</button>
    <button onclick="loadDay('Wednesday')">Wed</button>
    <button onclick="loadDay('Thursday')">Thu</button>
    <button onclick="loadDay('Friday')">Fri</button>
    <button onclick="loadDay('Saturday')">Sat</button>
    <button onclick="loadDay('Sunday')">Sun</button>
</div>

<!-- 🔥 THIS WAS MISSING -->
<div id="results"></div>

<div id="map"></div>

<div class="form">
    <h3>Add Special</h3>
    <input id="bar" placeholder="Bar name">
    <input id="address" placeholder="Address">
    <input id="deal" placeholder="Deal">
    <input id="day" placeholder="Day">
    <button onclick="addSpecial()">Add</button>
</div>

<script src="/static/map.js"></script>
<script src="/static/app.js"></script>

</body>
</html>
