<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <div class="top-bar">
        <h1>Beer Dollars</h1>
        <input type="text" id="filter" placeholder="Filter bars">
    </div>

    <div id="map"></div>

    <div class="add-bar-form">
        <h2>Add a Bar</h2>
        <input id="bar-name" placeholder="Name">
        <input id="bar-lat" placeholder="Latitude">
        <input id="bar-lng" placeholder="Longitude">
        <input id="bar-desc" placeholder="Description">
        <button onclick="submitBar()">Submit</button>
    </div>
</body>
</html>
