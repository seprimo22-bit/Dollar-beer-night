<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* ===== BASIC LAYOUT ===== */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #0A3D62;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* ===== GREETING BANNER ===== */
        #greeting {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #FFC312;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 10;
            opacity: 0.95;
        }

        .pop-animation {
            animation: popIn 0.6s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== DAY TABS ===== */
        #day-tabs {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .day-tab {
            padding: 6px 10px;
            background: #1B9CFC;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .active-day {
            background: #FFC312;
            color: #000;
            font-weight: bold;
        }

        /* ===== BAR LIST ===== */
        #bar-list {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 35%;
            overflow-y: auto;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 10px;
            z-index: 10;
        }

        .bar-item {
            padding: 10px;
            border-bottom: 1px solid #555;
        }

        .bar-name {
            font-size: 18px;
            font-weight: bold;
        }

        .bar-deal {
            color: #FFC312;
            margin-top: 4px;
        }

        .bar-address {
            font-size: 12px;
            opacity: 0.8;
        }

        /* ===== FLOATING ADD BUTTON ===== */
        #add-special-btn {
            position: absolute;
            bottom: 40%;
            right: 20px;
            background: #FFC312;
            color: #000;
            border: none;
            padding: 14px 18px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: bold;
            z-index: 20;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        /* ===== ADD SPECIAL MODAL ===== */
        #add-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }

        #add-modal.visible {
            display: flex;
        }

        #add-modal-content {
            background: white;
            padding: 20px;
            width: 90%;
            max-width: 350px;
            border-radius: 10px;
        }

        #add-modal-content h2 {
            margin-top: 0;
        }

        #add-modal-content input,
        #add-modal-content select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        #add-modal-content button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #1B9CFC;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }

        #add-close {
            background: #aaa;
        }
    </style>
</head>

<body>

    <!-- MAP -->
    <div id="map"></div>

    <!-- GREETING -->
    <div id="greeting"></div>

    <!-- DAY TABS -->
    <div id="day-tabs"></div>

    <!-- BAR LIST -->
    <div id="bar-list"></div>

    <!-- FLOATING ADD BUTTON -->
    <button id="add-special-btn">+</button>

    <!-- ADD SPECIAL MODAL -->
    <div id="add-modal">
        <div id="add-modal-content">
            <h2>Add Special</h2>

            <form id="add-form">
                <input type="text" name="name" placeholder="Bar Name" required>
                <input type="text" name="address" placeholder="Address (optional)">
                <input type="text" name="deal" placeholder="Deal (e.g. $1 Bud Light)" required>

                <select name="day" required>
                    <option value="">Select Day</option>
                    <option>Sunday</option>
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                </select>

                <button type="submit">Save Special</button>
                <button type="button" id="add-close">Cancel</button>
            </form>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <!-- GOOGLE MAPS -->
    <script 
        src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_KEY }}&callback=initBeerDollars" 
        async defer>
    </script>

</body>
</html>
