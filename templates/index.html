<!DOCTYPE html>
<html>
<head>
<title>Beer Dollars</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
{{!-- Include your CSS here --}}
body, html {margin:0;padding:0;height:100%;font-family:Arial;background:#0A3D62;}
#map{width:100%;height:65%;position:relative;z-index:1;}
#greeting{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#FFC312;color:#000;padding:10px 20px;border-radius:8px;font-weight:bold;z-index:10;opacity:0.95;}
#day-tabs{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;}
.day-tab{padding:6px 10px;background:#1B9CFC;color:white;border:none;border-radius:6px;font-size:14px;}
.active-day{background:#FFC312;color:#000;font-weight:bold;}
#bar-list{position:absolute;bottom:0;left:0;width:100%;max-height:35%;overflow-y:auto;background:rgba(0,0,0,0.75);color:white;padding:10px;z-index:10;}
.bar-item{padding:10px;border-bottom:1px solid #555;}
.bar-name{font-size:18px;font-weight:bold;}
.bar-deal{color:#FFC312;margin-top:4px;}
.bar-address{font-size:12px;opacity:0.8;}
#add-special-btn{position:absolute;bottom:40%;right:20px;background:#FFC312;color:#000;border:none;padding:14px 18px;border-radius:50%;font-size:22px;font-weight:bold;z-index:20;box-shadow:0 4px 8px rgba(0,0,0,0.4);}
#add-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:30;}
#add-modal.visible{display:flex;}
#add-modal-content{background:white;padding:20px;width:90%;max-width:350px;border-radius:10px;}
#add-modal-content input,#add-modal-content select{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc;}
#add-modal-content button{width:100%;padding:12px;margin-top:12px;background:#1B9CFC;color:white;border:none;border-radius:6px;font-size:16px;}
#add-close{background:#aaa;}
</style>
</head>
<body>
<div id="map"></div>
<div id="day-tabs"></div>
<div id="bar-list"></div>
<button id="add-special-btn">+</button>
<div id="add-modal"><div id="add-modal-content">
<form id="add-form">
<input name="name" placeholder="Bar Name" required>
<input name="address" placeholder="Address">
<input name="deal" placeholder="Deal" required>
<select name="day">
<option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
</select>
<button type="submit">Save</button>
<button type="button" id="add-close">Cancel</button>
</form>
</div></div>

<script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&callback=initBeerDollars" async defer></script>
<script>
let map, markers=[], infoWindow, tempMarker;
const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

function initBeerDollars(){
    map=new google.maps.Map(document.getElementById("map"),{zoom:13,center:{lat:41.1009,lng:-80.6495}});
    infoWindow=new google.maps.InfoWindow();
    generateDayTabs();
    fetchSpecials();
    map.addListener("click",e=>{openAddModal(e.latLng.lat(),e.latLng.lng());});
}
window.initBeerDollars=initBeerDollars;

function generateDayTabs(){
    const tabs=document.getElementById("day-tabs");
    days.forEach(d=>{
        const b=document.createElement("button");b.innerText=d;b.className="day-tab";
        b.onclick=()=>{document.querySelectorAll(".day-tab").forEach(tb=>tb.classList.remove("active-day"));b.classList.add("active-day");fetchSpecials(d);}
        tabs.appendChild(b);
    });
}

async function fetchSpecials(dayFilter=""){
    const res=await fetch("/api/specials");let data=await res.json();
    if(dayFilter)data=data.filter(d=>d.day===dayFilter);
    document.getElementById("bar-list").innerHTML="";
    markers.forEach(m=>m.setMap(null));markers=[];
    data.forEach(s=>{createMarker(s);addToList(s);});
}

function createMarker(s){
    if(!s.lat||!s.lng)return;
    const m=new google.maps.Marker({position:{lat:parseFloat(s.lat),lng:parseFloat(s.lng)},map});
    m.addListener("click",()=>{infoWindow.setContent(`<b>${s.name}</b><br>${s.deal}<br>${s.address||''}`);infoWindow.open(map,m);});
    markers.push(m);
}

function addToList(s){
    const div=document.createElement("div");div.className="bar-item";div.innerHTML=`<div class="bar-name">${s.name}</div><div class="bar-deal">${s.deal}</div><div class="bar-address">${s.address||''}</div>`;
    div.onclick=()=>{map.panTo({lat:parseFloat(s.lat),lng:parseFloat(s.lng)});map.setZoom(15);}
    document.getElementById("bar-list").appendChild(div);
}

function openAddModal(lat,lng){
    window.pendingLat=lat;window.pendingLng=lng;
    if(tempMarker)tempMarker.setMap(null);
    tempMarker=new google.maps.Marker({position:{lat,lng},map});
    document.getElementById("add-modal").classList.add("visible");
}

document.getElementById("add-close").onclick=()=>{document.getElementById("add-modal").classList.remove("visible");};
document.getElementById("add-form").addEventListener("submit",async e=>{
    e.preventDefault();const form=new FormData(e.target);
    const payload={name:form.get("name"),address:form.get("address"),deal:form.get("deal"),day:form.get("day"),lat:window.pendingLat,lng:window.pendingLng};
    await fetch("/api/add_special",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    document.getElementById("add-modal").classList.remove("visible");fetchSpecials();
});

document.getElementById("add-special-btn").onclick=()=>{map.setCenter({lat:41.1009,lng:-80.6495});map.setZoom(13);};
</script>
</body>
</html>
