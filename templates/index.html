<script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_KEY }}&callback=initBeerDollars" async defer></script>

<script>
let map;
let markers = [];

function initBeerDollars() {
    console.log("Google Maps API loaded. Initializing map...");

    // Set center to your local area (Austintown/Youngstown)
    const defaultCenter = { lat: 41.1009, lng: -80.6495 };

    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 13,
        center: defaultCenter,
        mapId: "YOUR_MAP_ID", 
        disableDefaultUI: true,
        zoomControl: true,
    });

    fetchSpecials();
}

// Global attachment to ensure Google can "see" the function
window.initBeerDollars = initBeerDollars;

async function fetchSpecials() {
    try {
        const response = await fetch('/api/specials');
        const specials = await response.json();
        
        const listContainer = document.getElementById('bar-list');
        const countBadge = document.getElementById('deal-count');
        
        if (listContainer) listContainer.innerHTML = ''; 
        if (countBadge) countBadge.innerText = `${specials.length} deals`;

        specials.forEach(special => {
            createMarker(special);
            // addToList(special); // Ensure this function is defined elsewhere if needed
        });
    } catch (err) {
        console.error("Error fetching specials:", err);
    }
}

function createMarker(special) {
    if (!special.lat || !special.lng) return;

    const marker = new google.maps.Marker({
        position: { lat: parseFloat(special.lat), lng: parseFloat(special.lng) },
        map: map,
        title: special.name
    });

    markers.push(marker);
}

// --- UI Logic for Modal & Form ---
// (Keep your existing Add Modal event listeners here)
    </script>
