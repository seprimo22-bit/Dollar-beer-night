<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Beer Dollars Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="admin-body">
  <div class="admin-container">
    <h1>Beer Dollars Admin</h1>
    
    <div class="admin-form">
      <h3>Add New Bar</h3>
      <input type="text" id="admin-name" placeholder="Bar Name (e.g. Flying Pig)">
      <input type="text" id="admin-deal" placeholder="Deal (e.g. $1.25 Cans)">
      <input type="text" id="admin-day" placeholder="Day (e.g. Friday)">
      <input type="text" id="admin-address" placeholder="Full Address (Street, City, State)">
      <button onclick="addNewBar()">Add to Database</button>
    </div>

    <hr>

    <p>Current Bars in System</p>
    <table id="admin-bars-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Deal</th>
          <th>Day</th>
          <th>Address</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="admin-tbody"></tbody>
    </table>
  </div>

  <script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>
</html>
