
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Lat</th>
                <th>Lng</th>
                <th>Description</th>
                <th>Verified</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for bar in bars %}
            <tr>
                <td>{{ bar.id }}</td>
                <td>{{ bar.name }}</td>
                <td>{{ bar.lat }}</td>
                <td>{{ bar.lng }}</td>
                <td>{{ bar.description }}</td>
                <td>{{ 'Yes' if bar.verified else 'No' }}</td>
                <td>
                    {% if not bar.verified %}
                    <button onclick="verifyBar({{ bar.id }})">Verify</button>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
