<!DOCTYPE html>
<html>
<head>
    <title>Beer Dollars Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: #0A3D62;
            color: white;
            font-family: Arial;
            padding: 20px;
        }

        .special {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h1>Beer Dollars Admin</h1>

<div id="list"></div>

<script>
    async function load() {
        const res = await fetch("/get_specials");
        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(s => {
            const div = document.createElement("div");
            div.className = "special";
            div.innerHTML = `
                <b>${s.name}</b><br>
                ${s.deal}<br>
                ${s.address}<br>
                <i>${s.day}</i>
            `;
            list.appendChild(div);
        });
    }

    load();
</script>

</body>
</html>
