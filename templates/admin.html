<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Beer Dollars</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<h1>Admin Panel</h1>
<form method="POST">
    <input type="text" name="day" placeholder="Day" required>
    <input type="text" name="name" placeholder="Bar Name" required>
    <input type="text" name="deal" placeholder="Deal" required>
    <input type="text" name="address" placeholder="Address" required>
    <input type="text" name="lat" placeholder="Latitude">
    <input type="text" name="lng" placeholder="Longitude">
    <button type="submit">Add Special</button>
</form>
<h2>Current Specials:</h2>
<ul>
{% for day, entries in specials.items() %}
    <li>{{ day }}
        <ul>
        {% for entry in entries %}
            <li>{{ entry.name }} - {{ entry.deal }} - {{ entry.address }}</li>
        {% endfor %}
        </ul>
    </li>
{% endfor %}
</ul>
</body>
</html>
