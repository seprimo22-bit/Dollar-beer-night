<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>🍺 Beer Dollars Admin</h1>
    </header>

    <h2>Bars Management</h2>

    <table id="bars-table" border="1" cellpadding="8" cellspacing="0" style="width:100%; text-align:left;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Deal</th>
                <th>Day</th>
                <th>Paid</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Filled dynamically by admin.js -->
        </tbody>
    </table>

    <h3>Add New Bar</h3>
    <form id="admin-add-bar-form">
        <label>Name: <input type="text" name="name" required></label><br>
        <label>Address: <input type="text" name="address"></label><br>
        <label>Deal: <input type="text" name="deal" required></label><br>
        <label>Day:
            <select name="day" required>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
                <option>Sunday</option>
            </select>
        </label><br>
        <label>Paid: <input type="checkbox" name="paid"></label><br>
        <input type="hidden" name="lat">
        <input type="hidden" name="lng">
        <button type="submit">Add Bar</button>
    </form>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
