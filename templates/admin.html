<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Admin Panel</h1>

    <form method="POST">
        <input name="name" placeholder="Bar Name" required><br>
        <input name="address" placeholder="Address" required><br>
        <input name="price" placeholder="$1" required><br>
        <button type="submit">Add</button>
    </form>

    <h2>Existing Specials</h2>
    <ul>
        {% for bar in specials %}
            <li>{{ bar.name }} — {{ bar.address }} — {{ bar.price }}</li>
        {% endfor %}
    </ul>

    <a href="/">Home</a>
    <a href="/map">Map</a>
</body>
</html>
