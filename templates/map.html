
<!DOCTYPE html>
<html>
<head>
    <title>Dollar Beer Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        #map { height: 500px; width: 100%; }
    </style>
</head>
<body>
    <h1>🍺 Dollar Beer Map</h1>
    <nav>
        <a href="/">Home</a> |
        <a href="/admin">Admin</a>
    </nav>

    <div id="map"></div>

    <h2>Current Specials:</h2>
    <ul>
        {% for bar in specials %}
            <li>{{ bar.name }} — {{ bar.address }} — {{ bar.price }}</li>
        {% endfor %}
    </ul>

    <script>
        function initMap() {
            const center = { lat: 40.0, lng: -85.0 };
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: center,
            });

            const specials = {{ specials | tojson }};

            specials.forEach(bar => {
                // For MVP: random small offset for visualization
                const lat = center.lat + (Math.random() - 0.5) * 0.1;
                const lng = center.lng + (Math.random() - 0.5) * 0.1;

                new google.maps.Marker({
                    position: { lat: lat, lng: lng },
                    map: map,
                    title: `${bar.name} — ${bar.price}`
                });
            });
        }
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key={{ api_key }}&callback=initMap" async defer></script>
</body>
</html>
