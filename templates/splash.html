<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Dollars Splash</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="splash-container">
    <!-- Logo from your image number folder -->
    <img src="{{ url_for('static', filename='1773978135981~2.png') }}" alt="Beer Dollars Logo" class="logo">

    <h1>Stretch your beer money!</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="splash-form">
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="text" id="code" placeholder="Code" required>
        <button id="enter-btn">Enter</button>
    </div>

    <div id="splash-error" class="error-msg"></div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
