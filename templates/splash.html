<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beer Dollars Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div id="splash">
  <img src="{{ url_for('static', filename='177397813598135981_squigglyline2.png') }}" alt="Beer Dollars" id="splash-image">
</div>

<div id="login-form">
  <form id="phoneForm" method="POST" action="/send-code">
    <input type="tel" name="phone" placeholder="Enter your phone" required>
    <button type="submit">Send Code</button>
  </form>

  <form id="codeForm" method="POST" action="/verify-code">
    <input type="text" name="code" placeholder="Enter code" required>
    <button type="submit">Verify</button>
  </form>

  {% if error %}
    <p style="color:red;">{{ error }}</p>
  {% endif %}
</div>
</body>
</html>
